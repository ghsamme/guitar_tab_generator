<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Midi to guitar chords</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Midi to guitar chords</h1>

<div class="upload-area" id="drop-zone" onclick="document.getElementById('fi').click()">
  <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5" style="margin:0 auto 8px;display:block"><path d="M9 19V6l12-3v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="15" r="3"/></svg>
  <p style="font-size:15px;color:#666">Klicka eller dra en MIDI-fil hit</p>
  <p style="font-size:12px;color:#aaa;margin-top:.25rem">.mid / .midi</p>
  <input type="file" id="fi" accept=".mid,.midi">
</div>

<div id="toolbar">
  <input id="title-input" type="text" placeholder="Låttitel (valfritt)">
  <button id="pdf-btn" onclick="exportPDF()">⬇ Spara som PDF</button>
</div>

<div id="staff-wrap"><canvas id="cv"></canvas></div>

<!-- Alt grepp modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h2 id="mtitle"></h2>
    <div class="modal-sub" id="msub"></div>
    <div class="alt-grid" id="mgrid"></div>
    <button class="close-btn" onclick="closeModal()">Stäng</button>
  </div>
</div>

<!-- Chord picker modal -->
<div id="picker-modal">
  <div class="picker">
    <h2>VÄLJ ACKORD</h2>
    <div class="picker-grid">
      <div><div class="picker-col-head">Root Note</div><div id="pk-roots"></div></div>
      <div><div class="picker-col-head">Chord Type</div><div id="pk-types"></div></div>
      <div><div class="picker-col-head">Tensions</div><div id="pk-tensions"></div></div>
      <div><div class="picker-col-head">Bass Note</div><div id="pk-bass"></div></div>
    </div>
    <div class="picker-actions">
      <button class="picker-ok" onclick="pickerConfirm()">OK</button>
      <button class="picker-cancel" onclick="pickerClose()">Avbryt</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
