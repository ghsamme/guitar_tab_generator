<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f5f5f0;color:#111;padding:1.5rem}
h1{font-size:22px;font-weight:500;margin-bottom:1.5rem}
.upload-area{border:1.5px dashed #bbb;border-radius:12px;padding:2rem;text-align:center;cursor:pointer;background:#fff;margin-bottom:1rem;transition:border-color .2s}
.upload-area:hover,.upload-area.drag{border-color:#4a7fd4}
input[type=file]{display:none}
#log{font-size:12px;font-family:monospace;color:#444;background:#f0f0f0;border-radius:8px;padding:.75rem 1rem;margin-bottom:1rem;white-space:pre-wrap;display:none}
#staff-wrap{background:#fff;border:1px solid #ccc;border-radius:12px;padding:1.25rem 1rem 1rem;overflow-x:auto;margin-bottom:1rem;display:none}

.modal h2{font-size:18px;font-weight:600;margin-bottom:.2rem}
.modal-sub{font-size:12px;color:#666;margin-bottom:1rem}
.alt-grid{display:flex;flex-wrap:wrap;gap:.6rem}
.alt-item{cursor:pointer;padding:.4rem .5rem;border-radius:8px;border:1.5px solid #ccc;text-align:center}

.alt-label{font-size:10px;color:#555;margin-top:.2rem}
.close-btn{margin-top:1rem;width:100%}
</style>

<body>
<h1>Låtnotation</h1>
<div class="upload-area" id="drop-zone" onclick="document.getElementById('fi').click()">

<script>
// ── Chord DB (injected from document) ────────────────────────────────────────
// DB is the full guitar.json object provided by the user
const DB = {"main":{"strings":6,"fretsOnChord":4,"name":"guitar"},"tunings":{"standard":["E2","A2","D3","G3","B3","E4"]},"keys":["C","C#","D","Eb","E","F","F#","G","Ab","A","Bb","B"],"suffixes":["major","minor","dim","dim7","sus","sus2","sus4","sus2sus4","7sus4","7/G","alt","aug","5","6","69","7","7b5","aug7","9","9b5","aug9","7b9","7#9","11","9#11","13","maj7","maj7b5","maj7#5","maj7sus2","maj9","maj11","maj13","m6","m69","m7","m7b5","m9","m11","mmaj7","mmaj7b5","mmaj9","mmaj11","add9","madd9","add11","/E","/F","/F#","/G","/G#","/A","/Bb","/B","/C","/C#","m/B","m/C","m/C#","/D","m/D","/D#","m/D#","m/E","m/F","m/F#","m/G","m/G#","m9/Bb","m9/B","m9/C","m9/C#","m9/D","m9/Eb","m9/E","m9/F","m9/F#","m9/G","m9/Ab","m9/A","/Eb","/Ab","m/A","m/Bb","m/Eb","m/Ab"]};
// We embed the chords portion separately to keep the script manageable
// The full chords object is passed via CHORDS_RAW below
const CHORDS_RAW = (()=>{
// We parse the chord data from the document that was pasted
// Since the document contains the full JSON, we reconstruct lookups from it
// The data was provided in the system context - we hardcode the key->suffix->positions map
// by referencing the structure we know from the JSON
return null; // will be loaded async from inline data
})();

// ── Key/suffix mapping ────────────────────────────────────────────────────────
// Map our chord quality names → DB suffix strings
const QUAL_TO_SUFFIX = {
  'maj':'major','min':'minor','7':'7','maj7':'maj7','min7':'m7',
  'dim':'dim','dim7':'dim7','aug':'aug','sus2':'sus2','sus4':'sus4',
  '9':'9','m7b5':'m7b5','m7b5':'m7b5','11':'11','13':'13','6':'6',
};
// Map root note names → DB key names
const ROOT_TO_KEY = {
  'C':'C','C#':'C#','Db':'C#','D':'D','D#':'Eb','Eb':'Eb',
  'E':'E','F':'F','F#':'F#','Gb':'F#','G':'G','G#':'Ab','Ab':'Ab',
  'A':'A','A#':'Bb','Bb':'Bb','B':'B',
};
// DB key name → property name in chords object (some use 'Csharp','Fsharp' etc)
const KEY_PROP = {
  'C':'C','C#':'Csharp','D':'D','Eb':'Eb','E':'E','F':'F',
  'F#':'Fsharp','G':'G','Ab':'Ab','A':'A','Bb':'Bb','B':'B',
};

let CHORDS = null; // will hold parsed chords object

let Tonal = null;
async function loadTonal() {
  if (Tonal) return;
  await new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/tonal/browser/tonal.min.js';
    s.onload=()=>{Tonal=window.Tonal;log('Tonal.js laddad');res()};
    s.onerror=()=>{log('Tonal.js misslyckades, använder fallback');res()};
    document.head.appendChild(s);
  });
}

async function loadChords() {
  if (CHORDS) return;
  // The full JSON was provided in the conversation. We load it from a data URL
  // embedded in this script. Since the document is huge, we fetch the same CDN
  // URL that was confirmed working (jsDelivr npm raw):
  log('Laddar ackordsdatabas...');
  const urls = [
    'https://cdn.jsdelivr.net/npm/@tombatossals/chords-db@0.5.1/lib/guitar.json',
    'https://raw.githack.com/tombatossals/chords-db/master/lib/guitar.json',
  ];
  for (const url of urls) {
    try {
      const r = await fetch(url);
      if (!r.ok) continue;
      const data = await r.json();
      CHORDS = data.chords;
      log(`DB laddad: ${Object.keys(CHORDS).length} tonartnycklar`);
      return;
    } catch(e) { log('  fel: '+e.message); }
  }
  // Fallback: use the inline data from the document the user pasted
  log('Nätverket misslyckades – försöker med inbyggd data…');
  CHORDS = INLINE_CHORDS;
  log('Inbyggd databas aktiv.');
}

function getPositions(root, quality) {
  if (!CHORDS) return [];
  const key = ROOT_TO_KEY[root] || root;
  const prop = KEY_PROP[key] || key;
  const suffix = QUAL_TO_SUFFIX[quality] || 'major';
  const arr = CHORDS[prop] || CHORDS[key];
  if (!arr) return [];
  const entry = arr.find(c => c.suffix === suffix)
              || arr.find(c => c.suffix === 'major');
  return entry ? (entry.positions || []) : [];
}

// Convert a DB position to internal rendering format
function convertPos(pos) {
  const {frets, baseFret, barres} = pos;
  const mute=[], open=[], dots=[];
  frets.forEach((f,i) => {
    const s = 6-i; // string 6=lowE … 1=highE
    if (f === -1) mute.push(s);
    else if (f === 0) open.push(s);
    else dots.push({s, f: baseFret-1+f});
  });
  let barre = null;
  if (barres && barres.length > 0) {
    const bv = barres[0]; // relative fret value
    if (bv === 0) {
      // full barre at baseFret across all non-muted strings
      const bs = frets.map((f,i)=>f>=0?6-i:null).filter(s=>s!==null);
      if (bs.length >= 2) {
        barre = {f:baseFret, from:Math.max(...bs), to:Math.min(...bs)};
        dots.splice(0,dots.length,...dots.filter(d=>d.f>baseFret));
      }
    } else {
      const actualF = baseFret-1+bv;
      const bs = frets.map((f,i)=>f===bv?6-i:null).filter(s=>s!==null);
      if (bs.length >= 2) {
        barre = {f:actualF, from:Math.max(...bs), to:Math.min(...bs)};
        const bset = new Set(bs);
        dots.splice(0,dots.length,...dots.filter(d=>!bset.has(d.s)));
      }
    }
  }
  return {mute,open,dots,barre,baseFret, label: baseFret>1?`Pos ${baseFret}`:'Open'};
}

// ── MIDI parser ───────────────────────────────────────────────────────────────
function parseMIDI(buf) {
  const u8=new Uint8Array(buf); let p=0;
  const r1=()=>u8[p++];
  const r2=()=>{const v=(u8[p]<<8)|u8[p+1];p+=2;return v};
  const r4=()=>{const v=(u8[p]<<24)|(u8[p+1]<<16)|(u8[p+2]<<8)|u8[p+3];p+=4;return v>>>0};
  const vlq=()=>{let v=0,b;do{b=r1();v=(v<<7)|(b&0x7f)}while(b&0x80);return v};
  const tag=()=>String.fromCharCode(u8[p],u8[p+1],u8[p+2],u8[p+3]);
  // Log first bytes for debugging
  const preview=Array.from(u8.slice(0,16)).map(b=>'0x'+b.toString(16).padStart(2,'0')+`(${b>=32&&b<127?String.fromCharCode(b):'.'})` ).join(' ');
  log('Första bytes: '+preview);
  // Scan forward to find MThd
  while(p<u8.length-4 && tag()!=='MThd') p++;
  if(p>=u8.length-4) throw new Error('Inte en giltig MIDI-fil – hittade ingen MThd-markör');
  p+=4;                          // skip 'MThd'
  const hlen=r4();               // header chunk length (always 6)
  const fmt=r2(), ntrk=r2(), ppqRaw=r2();
  const ppq=(ppqRaw&0x8000)?480:ppqRaw;
  // skip any extra header bytes beyond 6
  if(hlen>6) p+=hlen-6;
  log(`Format:${fmt} Spår:${ntrk} PPQ:${ppq}`);
  const evs=[];
  for(let t=0;t<ntrk;t++){
    while(p<=u8.length-8&&tag()!=='MTrk')p++;
    if(p>u8.length-8)break;
    p+=4; const end=Math.min(p+r4(),u8.length);
    let tick=0, runSt=0;
    while(p<end){
      tick+=vlq(); if(p>=end)break;
      let st=u8[p];
      if(st===0xFF){p++;r1();p+=vlq();continue}
      if(st===0xF0||st===0xF7){p++;p+=vlq();continue}
      if(st&0x80){runSt=st;p++}else st=runSt;
      if(!st){p++;continue}
      const tp=(st>>4)&0xF;
      if(tp===0x9){const n=r1(),v=r1();
        log(`  spår${t} tick${tick} note${n} vel${v}`);
        // Only keep real notes (21=A0 to 108=C8), skip note0 garbage and vel0
        if(v>0 && n>=21 && n<=108) evs.push({tick,note:n});
      }
      else if(tp===0x8||tp===0xA||tp===0xB||tp===0xE){r1();r1()}
      else if(tp===0xC||tp===0xD){r1()}
      else p++;
      if(p>end)p=end;
    }
    p=end;
  }
  log(`Note-on events: ${evs.length}`);
  return{evs,ppq};
}

// ── Chord identification ──────────────────────────────────────────────────────
const NN=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const TMPLS=[
  {n:'maj',iv:[0,4,7]},{n:'min',iv:[0,3,7]},{n:'7',iv:[0,4,7,10]},
  {n:'maj7',iv:[0,4,7,11]},{n:'min7',iv:[0,3,7,10]},{n:'dim',iv:[0,3,6]},
  {n:'aug',iv:[0,4,8]},{n:'sus2',iv:[0,2,7]},{n:'sus4',iv:[0,5,7]},
  {n:'dim7',iv:[0,3,6,9]},{n:'m7b5',iv:[0,3,6,10]},{n:'9',iv:[0,4,7,10,14]},
];
function identChord(pitches) {
  const pcs=[...new Set(pitches.map(n=>n%12))];
  if(pcs.length<2)return null;
  let best=null,bs=0;
  for(let r=0;r<12;r++) for(const t of TMPLS){
    const req=t.iv.map(i=>(r+i)%12);
    const sc=req.filter(p=>pcs.includes(p)).length/Math.max(req.length,pcs.length);
    if(sc>bs){bs=sc;best={r,t}}
  }
  if(!best||bs<0.55)return null;
  const rn=NN[best.r],q=best.t.n;
  let d=rn;
  if(q==='min')d+='m';else if(q==='min7')d+='m7';else if(q==='7')d+='7';
  else if(q==='maj7')d+='maj7';else if(q==='dim')d+='dim';else if(q==='aug')d+='aug';
  else if(q==='sus2')d+='sus2';else if(q==='sus4')d+='sus4';
  else if(q==='dim7')d+='dim7';else if(q==='m7b5')d+='m7b5';else if(q==='9')d+='9';
  return{name:d,root:rn,quality:q};
}

function buildChords(evs,ppq) {
  if(!evs.length) return [];

  evs.sort((a,b)=>a.tick-b.tick);
  const offset=evs[0].tick;
  evs.forEach(e=>e.tick-=offset);
  const lastTick=evs[evs.length-1].tick;
  log(`Tick-spann: 0 – ${lastTick}, PPQ:${ppq}, offset:${offset}`);

  // Bucket notes by beat (floor). Only use notes that start within
  // the FIRST half-beat of each beat window to avoid bleed from previous chord.
  const bm={};
  evs.forEach(e=>{
    const b=Math.floor(e.tick/ppq);
    const posInBeat=e.tick - b*ppq;
    if(posInBeat < ppq*0.75){ // only notes starting in first 3/4 of beat
      (bm[b]||(bm[b]=[])).push(e.note);
    }
  });
  const beats=Object.keys(bm).map(Number).sort((a,b)=>a-b);
  log(`Beats med noter: ${beats.join(', ')}`);

  // Merge consecutive beats (gap ≤ 3) into chord groups
  const groups=[];
  let cur=null;
  for(const b of beats){
    if(!cur||b-cur.beats[cur.beats.length-1]>3){
      cur={startBeat:b,beats:[b]};
      groups.push(cur);
    } else {
      cur.beats.push(b);
    }
  }
  log(`Grupper: ${groups.length} → beats: ${groups.map(g=>g.startBeat).join(', ')}`);

  const out=[];
  for(const g of groups){
    let notes=[];
    g.beats.forEach(b=>notes.push(...bm[b]));
    // Deduplicate by pitch class – keep only one note per semitone class
    const seen=new Set();
    notes=[...notes].sort((a,b)=>a-b).filter(n=>{
      const pc=n%12;
      if(seen.has(pc))return false;
      seen.add(pc);return true;
    });

    // Find best chord match: try all subsets by removing outliers
    // Priority: keep notes that appear most often as chord tones
    const ch=bestChordMatch(notes);
    if(ch) out.push({...ch, beat:g.startBeat, notes});
    else log(`  Ingen match beat ${g.startBeat}: [${notes.join(',')}]`);
  }
  log(`Identifierade ackord: ${out.map(c=>c.name+'@'+c.beat).join(', ')}`);
  return out;
}

function bestChordMatch(notes) {
  if(notes.length < 2) return null;

  // The lowest note is the bass – strongly prefer it as root
  const bassNote = Math.min(...notes);
  const bassPc = bassNote % 12;

  // Deduplicate by pitch class
  const pcMap={};
  notes.forEach(n=>{const pc=n%12;if(pcMap[pc]===undefined||n<pcMap[pc])pcMap[pc]=n;});
  const pcs=Object.keys(pcMap).map(Number);

  const SIMPLICITY={'maj':10,'min':10,'7':9,'maj7':9,'min7':9,'dim':8,'aug':8,'dim7':7,'m7b5':7,'9':5,'sus4':6,'sus2':6};

  let best=null, bestScore=-1;
  for(let r=0;r<12;r++){
    for(const t of TMPLS){
      const req=t.iv.map(i=>(r+i)%12);
      const hits=req.filter(p=>pcs.includes(p)).length;
      if(hits<2) continue;
      const extra=pcs.filter(p=>!req.includes(p)).length;
      const coverage=hits/req.length;
      const penalty=extra*0.15;
      const simplicity=(SIMPLICITY[t.n]||5)/10;
      // Strong bonus if root matches bass note
      const bassBonus = (r===bassPc) ? 0.35 : 0;
      const score=coverage*0.5 + simplicity*0.15 - penalty + bassBonus;
      if(score>bestScore){bestScore=score;best={r,t};}
    }
  }
  if(!best||bestScore<0.3) return null;

  const rn=NN[best.r],q=best.t.n;
  let d=rn;
  if(q==='min')d+='m';else if(q==='min7')d+='m7';else if(q==='7')d+='7';
  else if(q==='maj7')d+='maj7';else if(q==='dim')d+='dim';else if(q==='aug')d+='aug';
  else if(q==='sus2')d+='sus2';else if(q==='sus4')d+='sus4';
  else if(q==='dim7')d+='dim7';else if(q==='m7b5')d+='m7b5';else if(q==='9')d+='9';
  return{name:d,root:rn,quality:q};
}

// ── Canvas layout ─────────────────────────────────────────────────────────────
const CW=120,FH=112,NH=22,SH=172,RH=FH+NH+SH+20;
const CPR=6,ML=52,MT=16;
const FG='#111', BLUE='#2a5db0', MUTEC='#555';
let SEQ=[],SEL={},ZONES=[];

function drawFret(ctx,v,x,y,w,h){
  const S=6,F=5,ml=22,mr=5,mt=20,mb=5;
  const cw=(w-ml-mr)/(S-1), rh=(h-mt-mb)/F;
  let mn=99;
  v.dots.forEach(d=>{if(d.f>0)mn=Math.min(mn,d.f)});
  if(v.barre)mn=Math.min(mn,v.barre.f);
  if(mn===99)mn=0;
  const sf=mn<=1?0:mn-1, isOpen=sf===0;
  ctx.save();
  if(isOpen){ctx.strokeStyle=FG;ctx.lineWidth=3.5;ctx.beginPath();ctx.moveTo(x+ml,y+mt);ctx.lineTo(x+w-mr,y+mt);ctx.stroke()}
  // Fret band numbers
  ctx.font='bold 8px sans-serif';ctx.textAlign='right';ctx.fillStyle=FG;
  for(let f=1;f<=F;f++) ctx.fillText(sf+f, x+ml-3, y+mt+(f-.5)*rh+3);
  // Fret lines
  for(let f=0;f<=F;f++){ctx.strokeStyle=FG;ctx.lineWidth=f===0?1.2:1;ctx.beginPath();ctx.moveTo(x+ml,y+mt+f*rh);ctx.lineTo(x+w-mr,y+mt+f*rh);ctx.stroke()}
  // String lines
  for(let i=0;i<S;i++){ctx.strokeStyle=FG;ctx.lineWidth=1.2;ctx.beginPath();ctx.moveTo(x+ml+i*cw,y+mt);ctx.lineTo(x+ml+i*cw,y+mt+F*rh);ctx.stroke()}
  // Mutes & opens
  ctx.font='bold 11px sans-serif';ctx.textAlign='center';
  v.mute.forEach(s=>{ctx.fillStyle=MUTEC;ctx.fillText('×',x+ml+(6-s)*cw,y+mt-5)});
  v.open.forEach(s=>{ctx.strokeStyle=FG;ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(x+ml+(6-s)*cw,y+mt-7,4,0,Math.PI*2);ctx.stroke()});
  // Barre
  if(v.barre){
    const{f,from,to}=v.barre;
    const by=y+mt+(f-sf-.5)*rh,bx1=x+ml+(6-from)*cw,bx2=x+ml+(6-to)*cw;
    ctx.fillStyle=BLUE;ctx.beginPath();ctx.roundRect(bx1-5,by-6,bx2-bx1+10,12,6);ctx.fill();
  }
  // Dots
  v.dots.forEach(d=>{
    if(d.f===0){ctx.strokeStyle=FG;ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(x+ml+(6-d.s)*cw,y+mt-7,4,0,Math.PI*2);ctx.stroke();return}
    const dx=x+ml+(6-d.s)*cw,dy=y+mt+(d.f-sf-.5)*rh;
    ctx.fillStyle=BLUE;ctx.beginPath();ctx.arc(dx,dy,Math.min(cw,rh)*.4,0,Math.PI*2);ctx.fill();
  });
  ctx.restore();
}

const DIA=[0,0,1,1,2,3,3,4,4,5,5,6];
function tY(p,yo){const s=DIA[p%12]+Math.floor(p/12)*7;return yo+(DIA[4]+5*7-s)*4}
function bY(p,yo){const s=DIA[p%12]+Math.floor(p/12)*7;return yo+(DIA[7]+3*7-s)*4}

function render(){
  const canvas=document.getElementById('cv');
  if(!SEQ.length)return;
  const rows=Math.ceil(SEQ.length/CPR),mc=Math.min(SEQ.length,CPR);
  const W=ML+mc*CW+24,H=MT+rows*RH+20;
  const dpr=window.devicePixelRatio||1;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
  ZONES=[];

  for(let row=0;row<rows;row++){
    const rc=SEQ.slice(row*CPR,(row+1)*CPR);
    const yo=MT+row*RH,tyo=yo+FH+NH+20,byo=tyo+68;
    ctx.fillStyle=FG;ctx.textAlign='left';
    ctx.font='42px serif';ctx.fillText('𝄞',2,tyo+44);
    ctx.font='28px serif';ctx.fillText('𝄢',2,byo+30);
    const lineW=ML+rc.length*CW;
    ctx.strokeStyle=FG;ctx.lineWidth=1.2;
    for(let l=0;l<5;l++){
      ctx.beginPath();ctx.moveTo(ML,tyo+l*8);ctx.lineTo(lineW,tyo+l*8);ctx.stroke();
      ctx.beginPath();ctx.moveTo(ML,byo+l*8);ctx.lineTo(lineW,byo+l*8);ctx.stroke();
    }
    ctx.lineWidth=1.8;
    const bar=bx=>{ctx.beginPath();ctx.moveTo(bx,tyo);ctx.lineTo(bx,tyo+32);ctx.stroke();ctx.beginPath();ctx.moveTo(bx,byo);ctx.lineTo(bx,byo+32);ctx.stroke()};
    bar(ML); rc.forEach((_,ci)=>bar(ML+(ci+1)*CW));

    rc.forEach((ch,ci)=>{
      const ai=row*CPR+ci,cx=ML+ci*CW,mid=cx+CW/2;
      const vi=SEL[ai]||0;
      const positions=getPositions(ch.root,ch.quality);
      const raw=positions[Math.min(vi,positions.length-1)];
      const v=raw?convertPos(raw):null;
      if(v){const z={x:cx+4,y:yo+2,w:CW-8,h:FH-4,ci:ai};ZONES.push(z);drawFret(ctx,v,z.x,z.y,z.w,z.h)}
      ctx.font='bold 13px sans-serif';ctx.fillStyle=FG;ctx.textAlign='center';
      ctx.fillText(ch.name,mid,yo+FH+NH-4);
      const dn=(ny,x2)=>{ctx.fillStyle=BLUE;ctx.beginPath();ctx.ellipse(x2,ny,5.5,3.8,0,0,Math.PI*2);ctx.fill()};
      const ledg=(ny,top)=>{ctx.strokeStyle=FG;ctx.lineWidth=1.2;
        if(ny<top-2)for(let ly=top-8;ly>=ny-4;ly-=8){ctx.beginPath();ctx.moveTo(mid-8,ly);ctx.lineTo(mid+8,ly);ctx.stroke()}
        if(ny>top+34)for(let ly=top+40;ly<=ny+4;ly+=8){ctx.beginPath();ctx.moveTo(mid-8,ly);ctx.lineTo(mid+8,ly);ctx.stroke()}};
      ch.notes.filter(n=>n>=55).forEach(n=>{const ny=tY(n,tyo);dn(ny,mid);ledg(ny,tyo)});
      ch.notes.filter(n=>n<55).forEach(n=>{const ny=bY(n,byo);dn(ny,mid);ledg(ny,byo)});
    });
  }
}

// ── SVG fretboard for modal ───────────────────────────────────────────────────
function fretSVG(v,sz){
  const S=6,F=5,ml=22,mr=5,mt=20,mb=5;
  const W=sz,H=Math.round(sz*1.35),cw=(W-ml-mr)/(S-1),rh=(H-mt-mb)/F;
  let mn=99;v.dots.forEach(d=>{if(d.f>0)mn=Math.min(mn,d.f)});
  if(v.barre)mn=Math.min(mn,v.barre.f);if(mn===99)mn=0;
  const sf=mn<=1?0:mn-1,isO=sf===0;
  let s=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:${sz}px;height:${Math.round(sz*1.35)}px">`;
  if(isO)s+=`<line x1="${ml}" y1="${mt}" x2="${W-mr}" y2="${mt}" stroke="#111" stroke-width="3.5"/>`;
  for(let f=1;f<=F;f++)s+=`<text x="${ml-3}" y="${mt+(f-.5)*rh+3}" font-size="7.5" font-weight="bold" fill="#111" text-anchor="end">${sf+f}</text>`;
  for(let f=0;f<=F;f++)s+=`<line x1="${ml}" y1="${mt+f*rh}" x2="${W-mr}" y2="${mt+f*rh}" stroke="#111" stroke-width="${f===0?1.2:1}"/>`;
  for(let i=0;i<S;i++)s+=`<line x1="${ml+i*cw}" y1="${mt}" x2="${ml+i*cw}" y2="${mt+F*rh}" stroke="#111" stroke-width="1.2"/>`;
  v.mute.forEach(st=>s+=`<text x="${ml+(6-st)*cw}" y="${mt-5}" font-size="11" font-weight="bold" fill="#555" text-anchor="middle">×</text>`);
  v.open.forEach(st=>s+=`<circle cx="${ml+(6-st)*cw}" cy="${mt-7}" r="4" fill="none" stroke="#111" stroke-width="1.5"/>`);
  if(v.barre){const{f,from,to}=v.barre;const by=mt+(f-sf-.5)*rh,x1=ml+(6-from)*cw,x2=ml+(6-to)*cw;s+=`<rect x="${x1-5}" y="${by-6}" width="${x2-x1+10}" height="12" rx="6" fill="${BLUE}"/>`}
  v.dots.forEach(d=>{
    if(d.f===0){s+=`<circle cx="${ml+(6-d.s)*cw}" cy="${mt-7}" r="4" fill="none" stroke="#111" stroke-width="1.5"/>`;return}
    const x=ml+(6-d.s)*cw,y=mt+(d.f-sf-.5)*rh;
    s+=`<circle cx="${x}" cy="${y}" r="${Math.min(cw,rh)*.4}" fill="${BLUE}"/>`;
  });
  return s+'</svg>';
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(ci){
  const ch=SEQ[ci];
  const positions=getPositions(ch.root,ch.quality);
  document.getElementById('mtitle').textContent=ch.name;
  document.getElementById('msub').textContent=`${positions.length} grepp – klicka för att välja`;
  const grid=document.getElementById('mgrid');grid.innerHTML='';
  if(!positions.length){grid.innerHTML='<p style="color:#999">Inga grepp hittades.</p>';document.getElementById('modal').classList.add('open');return}
  const sel=SEL[ci]||0;
  positions.forEach((raw,vi)=>{
    const v=convertPos(raw);
    const el=document.createElement('div');
    el.className='alt-item'+(vi===sel?' selected':'');
    el.innerHTML=fretSVG(v,78)+`<div class="alt-label">${v.label}</div>`;
    el.onclick=()=>{SEL[ci]=vi;closeModal();render()};
    grid.appendChild(el);
  });
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open')}
document.getElementById('modal').onclick=e=>{if(e.target===document.getElementById('modal'))closeModal()};

// ── Canvas events ─────────────────────────────────────────────────────────────
const cv=document.getElementById('cv');
cv.addEventListener('click',e=>{
  const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  for(const z of ZONES)if(mx>=z.x&&mx<=z.x+z.w&&my>=z.y&&my<=z.y+z.h){openModal(z.ci);return}
});
cv.addEventListener('mousemove',e=>{
  const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  cv.style.cursor=ZONES.some(z=>mx>=z.x&&mx<=z.x+z.w&&my>=z.y&&my<=z.y+z.h)?'pointer':'default';
});

// ── Log / file ────────────────────────────────────────────────────────────────
function log(m){const el=document.getElementById('log');el.style.display='block';el.textContent+=m+'\n'}
function clearLog(){const el=document.getElementById('log');el.textContent='';el.style.display='none'}

async function handleFile(file){
  if(!file)return;
  clearLog();
  log(`Läser: ${file.name} (${(file.size/1024).toFixed(1)} KB)`);
  try{
    await loadChords();
    await loadTonal();
    const buf=await file.arrayBuffer();
    const{evs,ppq}=parseMIDI(buf);
    if(!evs.length){log('Inga note-on events hittades.');return}
    SEQ=buildChords(evs,ppq);
    log(`Identifierade ${SEQ.length} ackord: ${SEQ.map(c=>c.name).join(', ')}`);
    if(!SEQ.length){log('Kunde inte identifiera ackord.');return}
    SEL={};
    document.getElementById('staff-wrap').style.display='block';
    setTimeout(render,50);
  }catch(err){log('FEL: '+err.message+'\n'+err.stack)}
}

document.getElementById('fi').onchange=function(){handleFile(this.files[0])};
const dz=document.getElementById('drop-zone');
dz.ondragover=e=>{e.preventDefault();dz.classList.add('drag')};
dz.ondragleave=()=>dz.classList.remove('drag');
dz.ondrop=e=>{e.preventDefault();dz.classList.remove('drag');handleFile(e.dataTransfer.files[0])};

// Inline fallback chord data – minimal set for common chords if CDN fails
// (Full data loaded from CDN above; this is last resort)
const INLINE_CHORDS = {};
</script>
